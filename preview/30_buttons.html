<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--hm-paper);color:var(--hm-ink);font-family:var(--font-sans);}
.card{padding:24px 28px;box-sizing:border-box;width:100%;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.sw{flex:1 1 110px;min-width:100px;padding:14px;border:1px solid var(--color-hairline);display:flex;flex-direction:column;justify-content:space-between;min-height:92px;}
.sw .n{font-family:var(--font-sans);font-weight:500;font-size:12.5px;color:var(--hm-ink);}
.sw .h{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);margin-top:6px;}
.eyebrow{font-family:var(--font-sans);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--hm-ink);}
.meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);}
h1,h2,h3,h4{margin:0;font-family:var(--font-display);font-weight:400;color:var(--hm-ink);letter-spacing:-.01em;}
</style></head><body><div class="card"><div class="eyebrow" style="margin-bottom:14px;">Buttons</div><div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;"><button style="font-family:var(--font-sans);font-weight:500;font-size:12px;letter-spacing:.18em;text-transform:uppercase;padding:14px 26px;background:transparent;color:var(--hm-ink);border:1px solid var(--hm-ink);cursor:pointer;">Shop now</button><button style="font-family:var(--font-sans);font-weight:500;font-size:12px;letter-spacing:.18em;text-transform:uppercase;padding:14px 26px;background:var(--hm-ink);color:#fff;border:1px solid var(--hm-ink);cursor:pointer;">Add to cart</button><button style="font-family:var(--font-sans);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:10px 18px;background:transparent;color:var(--hm-ink);border:1px solid var(--hm-ink);cursor:pointer;">Learn more</button><a style="font-family:var(--font-sans);font-weight:500;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--hm-ink);border-bottom:1px solid var(--hm-ink);padding-bottom:2px;">Read the guide →</a></div><div class="meta" style="margin-top:14px;">Square (0 radius). 1px ink border. Wide tracking caps label.</div></div></body></html>
