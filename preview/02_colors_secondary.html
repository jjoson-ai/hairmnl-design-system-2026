<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--hm-paper);color:var(--hm-ink);font-family:var(--font-sans);}
.card{padding:24px 28px;box-sizing:border-box;width:100%;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.sw{flex:1 1 110px;min-width:100px;padding:14px;border:1px solid var(--color-hairline);display:flex;flex-direction:column;justify-content:space-between;min-height:92px;}
.sw .n{font-family:var(--font-sans);font-weight:500;font-size:12.5px;color:var(--hm-ink);}
.sw .h{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);margin-top:6px;}
.eyebrow{font-family:var(--font-sans);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--hm-ink);}
.meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);}
h1,h2,h3,h4{margin:0;font-family:var(--font-display);font-weight:400;color:var(--hm-ink);letter-spacing:-.01em;}
</style></head><body><div class="card"><div class="eyebrow" style="margin-bottom:14px;">Secondary palette</div><div class="row"><div class="sw" style="background:#CAD1D3;"><div><div class="n" >Sage</div></div><div><div class="h" >#CAD1D3</div><div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-top:2px;">P 175-1 C</div></div></div><div class="sw" style="background:#E5DEE7;"><div><div class="n" >Lilac</div></div><div><div class="h" >#E5DEE7</div><div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-top:2px;">P 88-1 U</div></div></div><div class="sw" style="background:#E7D8C3;"><div><div class="n" >Sand</div></div><div><div class="h" >#E7D8C3</div><div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-top:2px;">P 16-9 C</div></div></div><div class="sw" style="background:#D6DEEE;"><div><div class="n" >Sky</div></div><div><div class="h" >#D6DEEE</div><div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-top:2px;">P 106-9 U</div></div></div></div><div class="meta" style="margin-top:14px;">Categorised backgrounds — by hair issue, by hair type, social tiles.</div></div></body></html>
