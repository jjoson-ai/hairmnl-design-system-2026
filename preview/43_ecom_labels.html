<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--hm-paper);color:var(--hm-ink);font-family:var(--font-sans);}
.card{padding:24px 28px;box-sizing:border-box;width:100%;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.sw{flex:1 1 110px;min-width:100px;padding:14px;border:1px solid var(--color-hairline);display:flex;flex-direction:column;justify-content:space-between;min-height:92px;}
.sw .n{font-family:var(--font-sans);font-weight:500;font-size:12.5px;color:var(--hm-ink);}
.sw .h{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);margin-top:6px;}
.eyebrow{font-family:var(--font-sans);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--hm-ink);}
.meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);}
