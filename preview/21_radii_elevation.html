<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--hm-paper);color:var(--hm-ink);font-family:var(--font-sans);}
.card{padding:24px 28px;box-sizing:border-box;width:100%;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.sw{flex:1 1 110px;min-width:100px;padding:14px;border:1px solid var(--color-hairline);display:flex;flex-direction:column;justify-content:space-between;min-height:92px;}
.sw .n{font-family:var(--font-sans);font-weight:500;font-size:12.5px;color:var(--hm-ink);}
.sw .h{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);margin-top:6px;}
.eyebrow{font-family:var(--font-sans);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--hm-ink);}
.meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--hm-ink-muted);}
h1,h2,h3,h4{margin:0;font-family:var(--font-display);font-weight:400;color:var(--hm-ink);letter-spacing:-.01em;}
</style></head><body><div class="card"><div class="eyebrow" style="margin-bottom:14px;">Radii &amp; elevation</div><div style="display:flex;gap:18px;align-items:flex-end;"><div style="width:84px;height:56px;background:#fff;border:1px solid var(--hm-ink);"></div><div style="width:84px;height:56px;background:#fff;border:1px solid var(--hm-ink);border-radius:2px;"></div><div style="width:56px;height:56px;background:#fff;border:1px solid var(--hm-ink);border-radius:999px;"></div><div style="width:84px;height:56px;background:#fff;border:1px solid var(--color-hairline);box-shadow:0 1px 2px rgba(26,26,26,.04),0 2px 8px rgba(26,26,26,.04);"></div><div style="width:84px;height:56px;background:#fff;border:1px solid var(--color-hairline);box-shadow:0 12px 40px rgba(26,26,26,.12);"></div></div><div style="display:flex;gap:18px;margin-top:8px;"><div class="meta" style="width:84px;">0</div><div class="meta" style="width:84px;">2px</div><div class="meta" style="width:56px;">full</div><div class="meta" style="width:84px;">shadow-1</div><div class="meta" style="width:84px;">shadow-3</div></div></div></body></html>
