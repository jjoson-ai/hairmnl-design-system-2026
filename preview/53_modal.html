<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../motion.css">
<style>
body{margin:0;padding:0;background:#C9BAB0;font-family:var(--font-sans);color:var(--hm-ink);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--hm-paper);padding:40px 44px;max-width:440px;width:92%;border:1px solid rgba(26,26,26,.14);}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--hm-ink-muted);margin-bottom:14px;}
h3{font-family:var(--font-display);font-weight:400;font-size:32px;letter-spacing:-.015em;line-height:1.05;margin:0 0 14px;}
p{font-size:14px;line-height:1.55;color:var(--hm-ink-soft);margin:0 0 26px;}
.actions{display:flex;gap:10px;}
.btn{flex:1;font-family:var(--font-sans);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:14px;border:1px solid var(--hm-ink);background:transparent;color:var(--hm-ink);cursor:pointer;}
.btn.solid{background:var(--hm-ink);color:#fff;}
</style></head><body>
<div class="modal modal-in">
  <div class="eyebrow">Confirm</div>
  <h3>Remove from your <em>bag</em>?</h3>
  <p>Kérastase Résistance Bain · 250 ml will be removed. You can always add it back — it'll still remember the product you paired it with.</p>
  <div class="actions"><button class="btn">Keep it</button><button class="btn solid">Remove</button></div>
</div>
</body></html>
